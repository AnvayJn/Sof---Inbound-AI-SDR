<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sof by Gushwork — AI Inbound SDR (Trial · Softrol Systems)</title>
<style>
  :root{
    --ink:#14202e; --ink-2:#3b4a5a; --muted:#728196; --faint:#aab4c0;
    --line:#e3e8ee; --line-2:#eef2f6; --surface:#ffffff; --bg:#f1f4f8; --bg-2:#f6f8fa;
    --teal:#0f766e; --teal-d:#0b5852; --teal-soft:#e6f1ef;
    --green:#15803d; --green-soft:#e7f3ea;
    --blue:#1d4ed8; --blue-soft:#e7edfb;
    --amber:#b45309; --amber-soft:#fbf0df;
    --radius:13px; --shadow:0 1px 2px rgba(20,32,46,.04),0 6px 22px rgba(20,32,46,.06);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---------------- LOGIN ---------------- */
  #login{min-height:100vh;display:grid;place-items:center;background:radial-gradient(1200px 600px at 50% -10%,#1b2c3d,#14202e)}
  .login-card{background:#fff;width:380px;max-width:92vw;border-radius:18px;padding:34px 32px 30px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .login-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:3px}
  .login-brand .mk{width:26px;height:26px;border-radius:7px;background:var(--teal);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:800}
  .login-brand small{font-weight:600;color:var(--muted);font-size:12px;letter-spacing:0}
  .login-sub{color:var(--muted);font-size:13px;margin:6px 0 22px}
  .lab{font-size:12px;font-weight:600;color:var(--ink-2);margin:14px 0 5px;display:block}
  .inp{width:100%;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;outline:none;color:var(--ink)}
  .inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
  .btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:650}
  .btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal-d)}
  .btn-block{width:100%;margin-top:20px}
  .login-note{font-size:11.5px;color:var(--faint);text-align:center;margin-top:16px;line-height:1.5}
  .login-note b{color:var(--muted)}

  /* ---------------- APP SHELL ---------------- */
  #app{display:flex;min-height:100vh}
  .sidebar{width:222px;flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb-brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;padding:18px 18px 16px;border-bottom:1px solid #25364a}
  .sb-brand .mk{width:24px;height:24px;border-radius:6px;background:var(--teal);display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800}
  .sb-brand small{display:block;font-weight:500;color:#8298ab;font-size:10.5px;letter-spacing:.02em}
  .nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:2px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#c0cdda;font-size:13.5px;font-weight:550;background:none;border:none;text-align:left;width:100%}
  .nav-item:hover{background:#1e2f41;color:#fff}
  .nav-item.active{background:var(--teal);color:#fff}
  .nav-item .ic{width:17px;height:17px;flex-shrink:0;opacity:.95}
  .nav-item .badge{margin-left:auto;font-size:10.5px;font-weight:700;background:#2a3c50;color:#cdd9e4;border-radius:999px;padding:1px 7px}
  .nav-item.active .badge{background:rgba(255,255,255,.22);color:#fff}
  .nav-sep{font-size:10px;font-weight:700;letter-spacing:.1em;color:#5e718a;text-transform:uppercase;padding:14px 12px 6px}
  .account{border-top:1px solid #25364a;padding:13px 16px;display:flex;align-items:center;gap:10px}
  .account .av{width:32px;height:32px;border-radius:8px;background:#2b3e52;display:grid;place-items:center;font-size:12px;font-weight:700;color:#cfe0ee}
  .account .nm{font-size:12.5px;font-weight:650}
  .account .rl{font-size:11px;color:#8298ab}
  .account .out{margin-left:auto;background:none;border:none;color:#7990a4;font-size:11px}
  .account .out:hover{color:#fff;text-decoration:underline}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:16px 28px;border-bottom:1px solid var(--line);background:var(--surface)}
  .topbar h1{margin:0;font-size:18px;font-weight:750;letter-spacing:-.02em}
  .topbar .crumb{font-size:12.5px;color:var(--muted)}
  .topbar .spacer{flex:1}
  .sof-voicehint{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:650;color:#0b5852;background:var(--teal-soft);border:1px solid #cfe6e1;padding:5px 10px;border-radius:999px;cursor:default}
  .sof-voicehint.hidden{display:none}
  .sof-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--teal-d);background:var(--teal-soft);border:1px solid #cfe5e1;padding:5px 11px;border-radius:999px;font-weight:600}
  .sof-status .dot{width:8px;height:8px;border-radius:50%;background:#22b8a6;box-shadow:0 0 0 3px rgba(34,184,166,.25);animation:pulse 1.9s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,184,166,.4)}70%{box-shadow:0 0 0 6px rgba(34,184,166,0)}100%{box-shadow:0 0 0 0 rgba(34,184,166,0)}}
  .content{padding:24px 28px 48px;overflow-y:auto}

  /* ---------------- shared bits ---------------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{padding:14px 17px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
  .card-h h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em}
  .card-h .meta{font-size:11.5px;color:var(--muted)}
  .badge2{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .b-phone{background:var(--blue-soft);color:var(--blue)} .b-email{background:var(--teal-soft);color:var(--teal-d)}
  .b-text{background:var(--green-soft);color:var(--green)} .b-off{background:var(--amber-soft);color:var(--amber)}
  .b-booked{background:var(--green-soft);color:var(--green)} .b-prog{background:var(--amber-soft);color:var(--amber)}
  .b-neutral{background:var(--bg-2);color:var(--muted);border:1px solid var(--line)}
  .pageintro{font-size:13.5px;color:var(--ink-2);margin:-4px 0 18px;max-width:760px}

  /* metrics */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .icn{width:30px;height:30px;border-radius:8px;background:var(--teal-soft);display:grid;place-items:center;margin-bottom:11px}
  .kpi .icn svg{width:16px;height:16px;color:var(--teal)}
  .kpi .n{font-size:26px;font-weight:780;letter-spacing:-.02em}
  .kpi .n small{font-size:14px;color:var(--muted);font-weight:650}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi .d{font-size:11px;font-weight:650;color:var(--green);margin-top:6px}

  .two{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  .feed{padding:6px 4px}
  .feed .row{display:flex;gap:12px;padding:11px 13px;border-radius:10px}
  .feed .row:hover{background:var(--bg-2)}
  .feed .ic{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center}
  .feed .ic svg{width:16px;height:16px}
  .feed .tx{flex:1;font-size:13px}
  .feed .tx b{font-weight:650}
  .feed .tx .sub{color:var(--muted);font-size:12px}
  .feed .when{font-size:11.5px;color:var(--faint);white-space:nowrap}

  .src-bars{padding:16px 17px}
  .src-bar{margin-bottom:14px}
  .src-bar .t{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
  .src-bar .t .v{font-weight:700;color:var(--ink)}
  .src-bar .track{height:9px;background:var(--line-2);border-radius:99px;overflow:hidden}
  .src-bar .track i{display:block;height:100%;border-radius:99px;transition:width .9s cubic-bezier(.22,1,.36,1)}

  /* lists / tables */
  .list{overflow:hidden}
  .lrow{display:flex;align-items:center;gap:14px;padding:14px 17px;border-bottom:1px solid var(--line-2);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left}
  .lrow:last-child{border-bottom:none}
  .lrow:hover{background:var(--bg-2)}
  .lrow .av{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1d8f84,#0f766e);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;flex-shrink:0}
  .lrow .main-c{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .lrow .nm{font-size:13.5px;font-weight:650;color:var(--ink)}
  .lrow .co{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .mid{font-size:12.5px;color:var(--ink-2);width:230px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;width:150px}
  .lrow .rt .when{font-size:11px;color:var(--faint)}
  .lrow .chev{color:var(--faint);font-size:16px;flex-shrink:0}
  @media(max-width:760px){.lrow .mid{display:none}.lrow .rt{width:auto}}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--teal);background:none;border:none;padding:0;margin-bottom:14px}
  .back:hover{color:var(--teal-d)}
  .dhead{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .dhead .av{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#1d8f84,#0f766e);color:#fff;display:grid;place-items:center;font-size:17px;font-weight:700;flex-shrink:0}
  .dhead .nm{font-size:19px;font-weight:760;letter-spacing:-.01em}
  .dhead .ti{font-size:13px;color:var(--ink-2)}
  .dhead .co{font-size:12.5px;color:var(--muted)}
  .dhead .tags{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
  .dhead .spacer{flex:1}
  .respnote{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--green);background:var(--green-soft);border:1px solid #cfe7d6;border-radius:9px;padding:8px 12px;margin-bottom:16px}
  .respnote svg{width:16px;height:16px;flex-shrink:0}
  .bookcard .bt svg{width:15px;height:15px}
  .back svg{width:14px;height:14px}

  .detail-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:18px;align-items:start}
  @media(max-width:900px){.detail-grid,.two{grid-template-columns:1fr}}

  /* transcript */
  .transcript{padding:15px 17px;max-height:520px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .turn .who{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .turn.ai .who{color:var(--teal)} .turn.cust .who{color:var(--blue)} .turn.rep .who{color:var(--teal)}
  .turn .tx{font-size:13px;color:var(--ink-2);line-height:1.5}

  /* notes */
  .nblock{margin-bottom:15px}
  .nblock:last-child{margin-bottom:0}
  .nblock h4{margin:0 0 7px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:7px}
  .nblock h4 svg{width:14px;height:14px;color:var(--teal)}
  .nblock p{margin:0;font-size:13px;color:var(--ink-2);line-height:1.5}
  .qual{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .qcell{background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
  .qcell .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .qcell .v{font-size:12.5px;font-weight:600;margin-top:2px}
  .li{display:flex;gap:8px;font-size:13px;padding:4px 0;color:var(--ink-2)}
  .li .b{color:var(--teal);font-weight:700;flex-shrink:0}
  .li.obj .b{color:var(--amber)}
  .gapflag{background:var(--amber-soft);border:1px solid #f0dcbb;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#7c4a0e;line-height:1.5}
  .gapflag b{color:#7c4a0e}

  /* profile */
  .pfield{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:12.5px}
  .pfield:last-child{border-bottom:none}
  .pfield .k{color:var(--muted);width:84px;flex-shrink:0}
  .pfield .v{color:var(--ink);font-weight:500}
  .tag{display:inline-block;background:var(--teal-soft);color:var(--teal-d);font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin:0 4px 4px 0}

  /* form card */
  .formcard{padding:15px 17px}
  .formcard .fr{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:12.5px}
  .formcard .fr:last-child{border-bottom:none}
  .formcard .fr .k{color:var(--muted)} .formcard .fr .v{color:var(--ink);font-weight:550;text-align:right}
  .formcard .msg{margin-top:10px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:12.5px;color:var(--ink-2);font-style:italic}

  /* conversation (interactive) */
  .convo{padding:16px 17px;display:flex;flex-direction:column;gap:12px;min-height:320px}
  .cmsg{display:flex;gap:9px;max-width:88%}
  .cmsg .cav{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff}
  .cmsg.ai .cav{background:var(--teal)} .cmsg.cust{align-self:flex-end;flex-direction:row-reverse} .cmsg.cust .cav{background:#475569}
  .cbub{font-size:13px;line-height:1.5;padding:9px 13px;border-radius:13px}
  .cmsg.ai .cbub{background:var(--bg-2);border:1px solid var(--line);border-top-left-radius:4px;color:var(--ink)}
  .cmsg.cust .cbub{background:var(--ink);color:#fff;border-top-right-radius:4px}
  .cmsg .subj{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:3px}
  .opts{display:flex;flex-direction:column;gap:8px;padding:6px 2px 2px}
  .opts .lbl{font-size:11px;color:var(--muted);font-weight:600}
  .opt{text-align:left;background:#fff;border:1.5px solid var(--teal);color:var(--teal-d);border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:550}
  .opt:hover{background:var(--teal-soft)}
  .opt .role{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:1px}
  .bookcard{background:var(--green-soft);border:1px solid #cfe7d6;border-radius:11px;padding:13px 15px;margin-top:4px}
  .bookcard .bt{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.04em}
  .bookcard .bm{font-size:14px;font-weight:650;color:var(--ink);margin-top:4px}
  .bookcard .bd{font-size:12px;color:var(--ink-2);margin-top:2px}
  .typing-c{display:flex;gap:4px;padding:10px 13px}
  .typing-c span{width:6px;height:6px;border-radius:50%;background:#9aa7b6;animation:blink 1.2s infinite}
  .typing-c span:nth-child(2){animation-delay:.2s}.typing-c span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* actions row */
  .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}
  .abtn{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2);display:inline-flex;align-items:center;gap:7px}
  .abtn:hover{border-color:var(--teal);color:var(--teal-d)}
  .abtn svg{width:14px;height:14px}
  .abtn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .abtn.primary:hover{background:var(--teal-d);color:#fff}

  /* co-pilot aggregate */
  .agg{display:grid;grid-template-columns:1fr 1.1fr;gap:18px;align-items:start;margin-bottom:20px}
  .bars{padding:15px 17px}
  .bar{margin-bottom:12px}
  .bar:last-child{margin-bottom:0}
  .bar .bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar .bl .pct{color:var(--muted);font-weight:650}
  .bar .track{height:8px;background:var(--line-2);border-radius:99px;overflow:hidden}
  .bar .track i{display:block;height:100%;background:var(--teal);border-radius:99px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
  .bar.amber .track i{background:var(--amber)}
  .gapbig{background:linear-gradient(180deg,#fff,var(--amber-soft));border:1px solid #f0dcbb;border-radius:13px;padding:17px 18px;box-shadow:var(--shadow)}
  .gapbig .ft{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--amber)}
  .gapbig .ft svg{width:14px;height:14px}
  .gapbig h3{margin:9px 0 5px;font-size:16px;font-weight:750;letter-spacing:-.01em;color:var(--ink)}
  .gapbig p{margin:0;font-size:12.5px;color:var(--ink-2);line-height:1.5}
  .gapbig .row{display:flex;gap:22px;margin-top:13px;flex-wrap:wrap}
  .gapbig .st .sn{font-size:18px;font-weight:760;color:var(--ink)}
  .gapbig .st .sl{font-size:10.5px;color:var(--muted)}
  .copilot-banner{display:flex;gap:10px;align-items:flex-start;background:var(--teal-soft);border:1px solid #cfe5e1;border-radius:11px;padding:12px 15px;font-size:13px;color:var(--teal-d);margin-bottom:18px}
  .copilot-banner svg{width:17px;height:17px;flex-shrink:0;margin-top:1px;color:var(--teal)}
  .insight-line{display:flex;gap:9px;font-size:13px;padding:5px 0;color:var(--ink-2)}
  .insight-line .k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);width:88px;flex-shrink:0;padding-top:2px}

  /* toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:550;padding:11px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;z-index:50;display:flex;align-items:center;gap:9px}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast svg{width:15px;height:15px;color:#34d399}

  .secn{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--ink);text-transform:uppercase;margin:0 0 11px}

  /* stage badges + control */
  .b-stage{border:1px solid transparent}
  .s-new{background:var(--blue-soft);color:var(--blue)}
  .s-prog{background:var(--amber-soft);color:var(--amber)}
  .s-booked{background:var(--teal-soft);color:var(--teal-d)}
  .s-won{background:var(--green-soft);color:var(--green)}
  .s-lost{background:#fdeceb;color:#b42318}
  .stagebox{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .stagebox .lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .stage-pills{display:flex;gap:6px;flex-wrap:wrap}
  .spill{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .spill:hover{border-color:var(--muted)}
  .spill.on{cursor:default}
  .spill.on.s-new{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
  .spill.on.s-prog{border-color:var(--amber);color:var(--amber);background:var(--amber-soft)}
  .spill.on.s-booked{border-color:var(--teal);color:var(--teal-d);background:var(--teal-soft)}

        <div class="card"><div class="card-h"><h3>Replay the call — you're the caller</h3><span class="meta">Phone · pick what they say</span></div>
          <div class="convo" id="convo"></div>
          <div class="opts" id="opts" style="padding:0 17px 16px"></div>
        </div>
        <div id="resultSlot" style="display:flex;flex-direction:column;gap:18px">
          <div class="card"><div class="card-h"><h3>AI call notes</h3><span class="meta">Sof is listening…</span></div>
            <div style="padding:16px 17px;color:var(--muted);font-size:13px;line-height:1.5">As the call wraps, Sof writes the summary, qualification, objections, and the product-gap signal here — and assembles the lead profile. Finish the call to see it populate.</div></div>
        </div>
      </div>`
   + actionRow([{ic:"user",l:"Assign to engineer",p:true},{ic:"cal",l:"View on calendar"},{ic:"mail",l:"Send recap to lead"}]);
  wireBack(); wireStage(r);
  c.querySelectorAll("[data-act]").forEach((b,i)=>b.onclick=()=>{ if(i===1){go("calendar");return;} toast([ "Assigned to "+(r.who||"Marcus Bell")+" — full context attached.","","Recap email queued to "+r.name.split(" ")[0]+"."][i]); });
  convoState={lead:r,i:0,chosenTime:null,chosenPlacement:null,mode:"call",onBook:(ent)=>{
    document.getElementById("resultSlot").innerHTML=notesCard(ent.notes)+profileCard(ent.profile);
  }};
  stepConvo();
}

  const formCard = `<div class="card"><div class="card-h"><h3>Contact Sales — form submission</h3><span class="meta">softrol.com</span></div>
    <div class="formcard">${Object.entries(r.form).map(([k,v])=>`<div class="fr"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join("")}

    return;
  }

  // email/text → interactive conversation
  const channelNote = r.channel==="Email"
    ? "Sof replied by email. Step through how the customer responds — every path ends in a booked meeting that lands on the calendar."
    : "Sof replied by text. Step through how the customer responds — every path ends in a booked meeting that lands on the calendar.";
  c.innerHTML = dHead(r,`${chanBadge(r.channel,false)} <span class="badge2 b-prog" id="statusBadge">Sof responding…</span> <span id="stageHeadBadge">${stageBadge(r.stage)}</span>`)
    + `<div class="respnote">${ico("check","")} ${esc(r.resp)}</div>`

  convoState={lead:r,i:0,chosenTime:null,chosenPlacement:null,mode:r.channel.toLowerCase(),onBook:null};

let convoState=null;
function aiBubble(step,r){
  const conv=document.getElementById("convo");
  const subj = step.subj?`<div class="subj">📧 ${esc(step.subj)}</div>`:"";
  const txt = (step.ai||"").replace("{time}", convoState.chosenTime||"");
  // typing indicator then message
  const tdiv=document.createElement("div"); tdiv.className="cmsg ai"; tdiv.id="typing";
  tdiv.innerHTML=`<div class="cav">S</div><div class="cbub"><div class="typing-c"><span></span><span></span><span></span></div></div>`;
  conv.appendChild(tdiv); conv.scrollTop=conv.scrollHeight;
  return new Promise(res=>setTimeout(()=>{
    tdiv.remove();
    const d=document.createElement("div"); d.className="cmsg ai";
    d.innerHTML=`<div class="cav">S</div><div class="cbub">${subj}${esc(txt)}</div>`;
    conv.appendChild(d); conv.scrollTop=conv.scrollHeight; res();
  },650));
}
function custBubble(text){
  const conv=document.getElementById("convo");
  const d=document.createElement("div"); d.className="cmsg cust";
  d.innerHTML=`<div class="cav">${initials(convoState.lead.name)}</div><div class="cbub">${esc(text)}</div>`;
  conv.appendChild(d); conv.scrollTop=conv.scrollHeight;
}
async function stepConvo(){
  const r=convoState.lead, step=r.steps[convoState.i], optsEl=document.getElementById("opts");
  optsEl.innerHTML="";
  await aiBubble(step,r);
  if(step.final){
    const sb=document.getElementById("statusBadge"); if(sb) sb.outerHTML='<span class="badge2 b-booked">Meeting booked</span>';
    const conv=document.getElementById("convo");
    const bc=document.createElement("div"); bc.className="bookcard";
    bc.innerHTML=`<div class="bt">${ico("cal","")} Meeting scheduled</div><div class="bm">${esc(convoState.chosenTime)}</div><div class="bd">with ${esc(step.with)}, Sales Engineer · routed for a human to take from here</div>`;
    conv.appendChild(bc); conv.scrollTop=conv.scrollHeight;
    if(convoState.chosenTime) r.profile.meeting = convoState.chosenTime+" — "+step.with;
    if(convoState.chosenPlacement) r.placement = convoState.chosenPlacement;
    if(r.stage==="New"||r.stage==="In Progress") r.stage="Meeting Booked";
    const hb=document.getElementById("stageHeadBadge"); if(hb) hb.innerHTML=stageBadge(r.stage);
    const ps=document.getElementById("profSlot"); if(ps) ps.innerHTML=profileCard(r.profile);
    if(convoState.onBook) convoState.onBook(r);
    return;
  }
  const labels={call:"Caller says — pick one:",email:"Customer replies — pick one:",text:"Customer texts back — pick one:"};
  optsEl.innerHTML=`<div class="lbl">${labels[convoState.mode]||"Pick one:"}</div>`+
    step.opts.map((o,k)=>`<button class="opt" data-opt="${k}"><span class="role">${esc(r.name)}</span>${esc(o)}</button>`).join("");
  optsEl.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>{
    const k=+b.dataset.opt;
    if(step.isSlot){ convoState.chosenTime=step.times[k]; if(step.placements) convoState.chosenPlacement=step.placements[k]; }
    custBubble(step.opts[k]);
    optsEl.innerHTML="";
    convoState.i++;
    stepConvo();
  });
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById("toast");
  t.innerHTML=ico("check","")+`<span>${esc(msg)}</span>`;
  t.classList.add("show"); clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove("show"),2600);
}

/* ---------- live voice agent (ElevenLabs Conversational AI) ----------
   Turns Sof into a REAL voice agent the reviewer can actually talk to.

   To enable (≈10 min, see sof-voice-agent-prompt.md for full steps):
     1. Create an agent at elevenlabs.io → Agents, paste the system prompt +
        first message from sof-voice-agent-prompt.md, pick a voice, and set the
        LLM (Claude works well). In the Advanced tab, DISABLE authentication
        (the embed widget requires a public agent).
     2. Copy the Agent ID and paste it below, replacing REPLACE_WITH_AGENT_ID.
     3. Host this file over https (e.g. drag it onto Netlify Drop) so the
        browser will grant microphone access — mic is blocked on file:// .

   Until an Agent ID is set, the trial behaves exactly as before (no voice). */
const SOF_VOICE_AGENT_ID = "agent_9801ktzk1wa0eq3s986ckzg0n0zg";

function voiceEnabled(){ return SOF_VOICE_AGENT_ID && SOF_VOICE_AGENT_ID.indexOf("REPLACE_WITH_AGENT_ID")===-1; }
function mountVoiceWidget(){
  if(!voiceEnabled() || document.getElementById("sof-convai")) return;
  if(!document.getElementById("eleven-convai-js")){
    const s=document.createElement("script");
    s.id="eleven-convai-js";
    s.src="https://unpkg.com/@elevenlabs/convai-widget-embed";
    s.async=true; s.type="text/javascript";
    document.body.appendChild(s);
  }
  const w=document.createElement("elevenlabs-convai");
  w.id="sof-convai";
  w.setAttribute("agent-id",SOF_VOICE_AGENT_ID);
  w.setAttribute("action-text","Talk to Sof");
  w.setAttribute("start-call-text","Start voice call");
  w.setAttribute("end-call-text","End call");
  w.setAttribute("expand-text","Talk to Sof");
  w.setAttribute("collapse-text","Minimize");
  w.setAttribute("avatar-orb-color-1","#0F766E");
  w.setAttribute("avatar-orb-color-2","#12A594");
  document.body.appendChild(w);
  const h=document.getElementById("voiceHint"); if(h) h.classList.remove("hidden");
  setTimeout(()=>toast("Live voice is on — tap “Talk to Sof”, bottom-right, to speak with Sof."),700);
}

/* ---------- boot ---------- */
function signIn(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  go("dashboard");
  mountVoiceWidget();
}
document.getElementById("li-go").onclick=signIn;
document.getElementById("li-pass").addEventListener("keydown",e=>{if(e.key==="Enter")signIn();});
document.getElementById("logout").onclick=()=>{document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden");};
document.getElementById("nav") && document.getElementById("app").addEventListener("click",e=>{const b=e.target.closest("[data-nav]");if(b)go(b.dataset.nav);});
</script>
